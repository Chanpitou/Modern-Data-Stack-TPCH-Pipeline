version: 2

models:
  - name: dim_customers
    description: "Dimensional customer table with nation and region information."
    columns:
      - name: customer_key
        tests:
          - unique
          - not_null

  - name: dim_suppliers
    description: "Dimensional suppliers table with nation and region information."
    columns:
      - name: supplier_key
        tests:
          - unique
          - not_null

  - name: dim_parts
    description: "Dimensional parts table."
    columns:
      - name: part_key
        tests:
          - unique
          - not_null

  - name: fct_order_items
    description: "The central fact table. Every row is an ordered item with customer, part, and supplier dimensions information."
    columns:
      - name: order_key
        tests:
          - not_null
          - relationships:
              to: ref('stg_tpch_orders')
              field: order_key
      - name: customer_key
        tests:
          - not_null
          - relationships:
              to: ref('dim_customers')
              field: customer_key
      - name: supplier_key
        tests:
          - not_null
          - relationships:
              to: ref('dim_suppliers')
              field: supplier_key
      - name: part_key
        tests:
          - not_null
          - relationships:
              to: ref('dim_parts')
              field: part_key